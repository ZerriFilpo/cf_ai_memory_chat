<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cf_ai_memory_chat</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────────────────── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #16213e;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      border-right: 1px solid #0f3460;
    }

    .sidebar-title {
      font-size: 1rem;
      font-weight: 700;
      color: #e94560;
      letter-spacing: 0.03em;
      margin-bottom: 24px;
      word-break: break-word;
    }

    .btn-new-chat {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      text-align: center;
    }

    .btn-new-chat:hover {
      background: #c73652;
    }

    /* ── Main chat area ──────────────────────────────────── */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #1a1a2e;
    }

    /* Scrollable message list */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 3px;
    }

    /* Chat bubbles */
    .message {
      display: flex;
      max-width: 70%;
    }

    .message.user {
      align-self: flex-end;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .message.user .bubble {
      background: #0f3460;
      color: #e0e0e0;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #e8eaf0;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    /* ── Input bar ───────────────────────────────────────── */
    .input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      background: #16213e;
      border-top: 1px solid #0f3460;
    }

    .input-bar input[type="text"] {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.95rem;
      color: #e0e0e0;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .input-bar input[type="text"]::placeholder {
      color: #6b7280;
    }

    .input-bar input[type="text"]:focus {
      border-color: #e94560;
    }

    .btn-send {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s ease;
    }

    .btn-send:hover {
      background: #c73652;
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 600px) {
      .sidebar {
        width: 200px;
        min-width: 200px;
        padding: 16px 12px;
      }

      .message {
        max-width: 90%;
      }
    }

    @media (max-width: 420px) {
      .sidebar {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">cf_ai_memory_chat</div>
    <button class="btn-new-chat">+ New Chat</button>
  </aside>

  <!-- Main chat area -->
  <main class="chat-container">

    <!-- Message list -->
    <div class="messages">
      <div class="message assistant">
        <div class="bubble">Hello! How can I help you today?</div>
      </div>
      <div class="message user">
        <div class="bubble">Tell me about Cloudflare Workers.</div>
      </div>
      <div class="message assistant">
        <div class="bubble">Cloudflare Workers let you run serverless code at the edge, close to your users, with near-zero latency.</div>
      </div>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
      <input type="text" placeholder="Type a message…" aria-label="Message input" />
      <button class="btn-send">Send</button>
    </div>

  </main>

</body>
</html>
